server.port=8081

spring.application.name=ecom-order-service

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:9090/eureka/

resilience4j.ratelimiter.instances.inventoryRateLimiter.limit-for-period=2
resilience4j.ratelimiter.instances.inventoryRateLimiter.limit-refresh-period=10s
resilience4j.ratelimiter.instances.inventoryRateLimiter.timeout-duration=2s

custom.message=Hello Order Service

spring.datasource.url=jdbc:mysql://localhost:3306/order_db
spring.datasource.username=root
spring.datasource.password=ROOT